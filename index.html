<body>
<div class="app" id="app"></div>
<script>
// ─── STATE ───
let P = [];
let curSeason = '2026-27';
let di = 0;
let tab = 'daily';
let selMon = '';
let fDir = 'all', fRes = 'all', fTier = 'all', fMatch = 'all', fConf = 0, srt = 'def', fSearch = '';
let exp = new Set();
let _lastTap = '', _lastTapTime = 0;
let leaderExp = new Set();
// Per-card sparkline state: key → {win:'L10', venue:'all', line:'prop', customMin:null}
let expSpk = {};
let leaderShowAll = new Set();

// ─── V14 FIELD NORMALISER ───
function normalisePlay(p) {
  // Direction
  p.dir = p.dir || p.direction || '';

  // Match / game — build proper fixture string
  // Priority: stored match → game (full name) → away@home (abbrevs) → opponent abbrev
  if (!p.match || p.match === p.opponent) {
    if (p.game && p.game !== 'None' && p.game !== 'null') {
      p.match = p.game;
    } else if (p.away && p.home && p.away !== 'None' && p.home !== 'None') {
      p.match = p.away + ' @ ' + p.home;
    } else {
      p.match = p.opponent || '';
    }
  }
  // fullMatch: same logic
  if (!p.fullMatch || p.fullMatch === p.opponent) {
    p.fullMatch = p.match;
  }

  // gameTime: V14 stores as game_time (from Excel Game_Time_ET)
  p.gameTime = p.gameTime || p.game_time || '';

  // team badge: not in V14 JSON
  p.team = p.team || '';

  // isHome: derive from home/away fields vs opponent
  // For live plays: home/away are team abbreviations
  // For backtest: same if Excel had them
  if (p.isHome == null) {
    if (p.home && p.away && p.opponent) {
      // player is away if their opponent is the home team
      p.isHome = p.opponent.toUpperCase() === p.home.toUpperCase() ? true : false;
    } else if (p.recent20 && p.recent20.length && typeof p.recent20[0] === 'object') {
      // fall back to last recent game venue before we convert
      const last = p.recent20[p.recent20.length - 1];
      p.isHome = last.home === true ? true : last.home === false ? false : null;
    } else {
      p.isHome = null;
    }
  }

  // l20: approximate as midpoint of l10 and l30
  if (p.l20 == null && p.l10 != null && p.l30 != null) {
    p.l20 = +((p.l10 + p.l30) / 2).toFixed(1);
  }

  // flagsStr
  if (p.flags != null && p.flagsStr == null) p.flagsStr = p.flags + '/10';

  // flagDetails: build from flag count if missing
  if (!p.flagDetails || !p.flagDetails.length) {
    const names = ['Volume','HR L30','HR L10','Trend','Context','Defense','H2H','Pace','FG Trend','Min Trend'];
    const agrees = Math.round(p.flags || 0);
    p.flagDetails = names.map((name, i) => ({ name, agrees: i < agrees, detail: '' }));
  }

  // volume & trend
  p.volume = p.volume != null ? p.volume : (p.l30 != null && p.line != null ? +(p.l30 - p.line).toFixed(1) : null);
  p.trend  = p.trend  != null ? p.trend  : (p.momentum != null ? +p.momentum.toFixed(1) : null);

  // hr10/hr30: V14 decimal → integer %
  p.hr10Pct = p.hr10 != null ? Math.round(p.hr10 * 100) : null;
  p.hr30Pct = p.hr30 != null ? Math.round(p.hr30 * 100) : null;

  // recent20: objects → split into numbers + homes BEFORE isHome was derived above,
  // but isHome derivation from recent20 only fires if home/away fields are absent.
  // Safe to convert now.
  if (p.recent20 && p.recent20.length && typeof p.recent20[0] === 'object') {
    p.recent20homes = p.recent20.map(r => r.home === true);
    p.recent20dates = p.recent20.map(r => r.date || '');
    p.recent20 = p.recent20.map(r => r.pts);
  }

  // recentOver / Under
  if (Array.isArray(p.recent20)) {
    p.recentOver  = p.recent20.filter(v => v > p.line).length;
    p.recentUnder = p.recent20.filter(v => v <= p.line).length;
  }

  // H2H aliases
  p.h2hG          = p.h2hG          ?? p.h2h_games  ?? 0;
  p.h2h           = p.h2h           ?? p.h2h_avg     ?? null;
  p.h2hTsDev      = p.h2hTsDev      ?? p.h2h_ts_dev  ?? null;
  p.h2hFgaDev     = p.h2hFgaDev     ?? p.h2h_fga_dev ?? null;
  p.h2hConfidence = p.h2hConfidence ?? p.h2h_conf     ?? null;
  p.h2hProfile    = p.h2hProfile    ?? null;

  // DVP / pace aliases (V14 names)
  p.defP = p.defP ?? p.defP_dynamic ?? null;
  p.pace = p.pace ?? p.pace_rank    ?? null;

  // Shooting / minutes — V14 field names → V12-style camelCase
  p.fga10  = p.fga10  ?? p.fga_l10  ?? null;
  p.minL10 = p.minL10 ?? p.min_l10  ?? null;
  p.minL30 = p.minL30 ?? p.min_l30  ?? null;
  // FG% — not in V14 JSON; leave as null → shows "—"
  p.fgL10  = p.fgL10  ?? null;
  p.fgL30  = p.fgL30  ?? null;
  p.fga30  = p.fga30  ?? null;
  // Min trend — derive as recent_min vs min_l10 if available
  p.minTrend = p.minTrend ?? null;
  p.fgTrend  = p.fgTrend  ?? null;

  // Home/away scoring (V14 has home_l10, away_l10 from rolling engine)
  p.homeAvgPts = p.homeAvgPts ?? p.home_l10 ?? null;
  p.awayAvgPts = p.awayAvgPts ?? p.away_l10 ?? null;

  // Decision signal aliases — map snake_case JSON keys → dashboard camelCase
  p.usage_l10       = p.usage_l10       ?? null;
  p.usage_l30       = p.usage_l30       ?? null;
  p.min_cv          = p.min_cv          ?? null;
  p.fta_l10         = p.fta_l10         ?? null;
  p.ft_rate         = p.ft_rate         ?? null;
  p.fg3a_l10        = p.fg3a_l10        ?? null;
  p.pts_per_min     = p.pts_per_min     ?? null;
  p.home_away_split = p.home_away_split ?? null;
  p.level_ewm       = p.level_ewm       ?? null;
  p.line_vs_l30     = p.line_vs_l30     ?? null;
  p.extreme_hot     = p.extreme_hot     ?? null;
  p.extreme_cold    = p.extreme_cold    ?? null;
  p.is_long_rest    = p.is_long_rest    ?? null;
  p.recent_min_trend= p.recent_min_trend?? null;
  p.h2h_trend       = p.h2h_trend       ?? null;
  // min_line / max_line from prop data
  p.min_line = p.min_line ?? null;
  p.max_line = p.max_line ?? null;

  // V14-specific
  p.enginesAgree      = p.enginesAgree      !== undefined ? p.enginesAgree : true;
  p.meanReversionRisk = p.meanReversionRisk ?? 0;
  p.earlySeasonW      = p.earlySeasonW      ?? 1.0;
  p.seasonProgress    = p.seasonProgress    ?? 0.5;
  p.calProb           = p.calProb           ?? null;
  p.volRisk           = p.volRisk           ?? p.vol_risk        ?? null;
  p.lineSharpness     = p.lineSharpness     ?? p.line_sharpness  ?? null;
  p.sourceSynth       = p.source === 'synthetic';

  // lineHistory
  p.lineHistory = p.lineHistory || [];

  // posSimple for matchup label
  p.posSimple = p.posSimple || p.position || '';

  return p;
}

// ─── HELPERS ───
const clr = (v, r) => v == null ? 'var(--tx)' : v > r ? 'var(--gr)' : v < r ? 'var(--rd)' : 'var(--tx)';
const hrc = r => r >= 55 ? 'var(--gr)' : r <= 40 ? 'var(--rd)' : 'var(--tx)';
const cfc = c => c >= .62 ? 'var(--gr)' : c >= .55 ? 'var(--yl)' : 'var(--tx3)';
function allDates() { return [...new Set(P.map(p => p.date))].sort(); }
function latestDate() { const d = allDates(); return d[d.length-1] || ''; }
function isVoid(p) { const r = p.result; return r === 'PUSH' || r === 'NO_PLAY' || r === 'NO PLAY'; }
function isDNP(p)  { return p.result === 'DNP'; }
function isLean(p) { return p.dir === 'LEAN OVER' || p.dir === 'LEAN UNDER' || p.tierLabel === 'T3_LEAN'; }

function tierBadge(p) {
  const tl = p.tierLabel || ('T' + p.tier);
  switch(tl) {
    case 'T1_ULTRA':   return '<span class="tier-badge tier-ultra" style="animation:glow 2s ease-in-out infinite">★★★ ULTRA</span>';
    case 'T1_PREMIUM': return '<span class="tier-badge tier-premium">★★ PREMIUM</span>';
    case 'T1':         return '<span class="tier-badge tier-t1">★ T1</span>';
    case 'T2':         return '<span class="tier-badge tier-t2">T2</span>';
    case 'T3':         return '<span class="tier-badge tier-t3">T3</span>';
    case 'T3_LEAN':    return '<span class="tier-badge tier-lean">LEAN ' + (p.dir&&p.dir.includes('OVER')?'↗':'↘') + '</span>';
    default:           return '<span class="tier-badge tier-t3">T' + p.tier + '</span>';
  }
}

const POS_FULL = {
  'G':'Guard','PG':'Point Guard','SG':'Shooting Guard','F':'Forward',
  'SF':'Small Forward','PF':'Power Forward','C':'Center',
  'F-C':'Forward-Center','C-F':'Center-Forward','G-F':'Guard-Forward','F-G':'Forward-Guard',
  'Guard':'Guard','Forward':'Forward','Center':'Center',
};
function posLabel(p) {
  const pos = p.position || p.posSimple || '';
  return POS_FULL[pos] || POS_FULL[pos.split('-')[0]] || pos || '';
}

const _B = window.location.pathname.replace(/\/index\.html$/,'').replace(/\/$/,'');

// ─── DATA LOADING ───
async function loadSeason(season) {
  curSeason = season;
  const el = document.getElementById('app');
  el.innerHTML = `<div style="text-align:center;padding:60px 20px">
    <div style="font:800 22px var(--M);background:linear-gradient(135deg,var(--bl),var(--vi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px">PropEdge V17.0</div>
    <div style="font:400 12px var(--S);color:var(--tx3);margin-bottom:16px">Loading ${season} data...</div>
    <div style="height:3px;background:var(--bg2);border-radius:2px;max-width:200px;margin:0 auto;overflow:hidden"><div style="height:100%;width:40%;background:linear-gradient(90deg,var(--bl),var(--vi));border-radius:2px;animation:pulse 1.2s ease-in-out infinite"></div></div></div>`;
  try {
    let raw = [];
    if (season === '2024-25') {
      const r = await fetch(_B + '/data/season_2024_25.json?t=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      raw = await r.json();
    } else {
      const [seasonR, todayR] = await Promise.allSettled([
        fetch(_B + '/data/season_2025_26.json?t=' + Date.now()).then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }),
        fetch(_B + '/data/today.json?t=' + Date.now()).then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).catch(() => [])
      ]);
      const seasonData = seasonR.status === 'fulfilled' ? seasonR.value : [];
      const todayData  = todayR.status  === 'fulfilled' ? todayR.value  : [];
      raw = mergeSeasonWithToday(seasonData, todayData);
    }
    P = raw.map(normalisePlay);
    P.sort((a,b) => a.tier - b.tier || b.conf - a.conf);
    const dates = allDates();
    di = dates.length - 1;
    selMon = dates[di] ? dates[di].slice(0,7) : '';
    fDir='all'; fRes='all'; fTier='all'; fMatch='all'; fConf=0; srt='def'; fSearch='';
    exp.clear(); leaderExp.clear(); leaderShowAll.clear();
    render();
  } catch(e) {
    el.innerHTML = `<div style="text-align:center;padding:40px">
      <div style="font:700 18px var(--M);color:var(--rd)">Load Error</div>
      <div style="font:400 12px var(--S);color:var(--tx3);margin:12px 0">${e.message}<br><br>Run: <code style="color:var(--bl)">python3 generate_backtest.py</code></div>
      <button onclick="loadSeason('${season}')" style="padding:8px 20px;background:var(--blA);border:1px solid rgba(56,189,248,.3);color:var(--bl);border-radius:8px;font:500 11px var(--M);cursor:pointer">Retry</button></div>`;
  }
}

function mergeSeasonWithToday(seasonData, todayData) {
  if (!todayData || !todayData.length) return seasonData;
  // today.json only contains plays for the current batch date
  // Dates present in today.json
  const todayDates = new Set(todayData.map(p => p.date));
  // From season.json, keep plays for dates NOT in today.json,
  // plus WIN/LOSS graded plays for dates that ARE in today.json
  // (DNP from season.json for today's date get superseded by today.json)
  const kept = seasonData.filter(p => {
    if (!todayDates.has(p.date)) return true;
    // For today's dates: keep graded WIN/LOSS/LEAN from season JSON.
    // Ungraded ("" or null) season plays get superseded by fresh today.json scoring.
    return p.result === 'WIN' || p.result === 'LOSS' || p.result === 'LEAN';
  });
  // Add today.json plays that aren't already covered as WIN/LOSS in kept
  const keptKeys = new Set(kept.filter(p => todayDates.has(p.date)).map(p => p.player+'_'+p.date+'_'+p.line));
  const newToday = todayData.filter(p => !keptKeys.has(p.player+'_'+p.date+'_'+p.line));
  return [...kept, ...newToday];
}

// ─── SEASON STATS ───
function computeSeasonStats() {
  const byDate = {};
  P.forEach(p => {
    if (!byDate[p.date]) byDate[p.date] = {date:p.date,plays:0,graded:0,wins:0,losses:0,t1:0,t1w:0,t2:0,t2w:0,t3:0,t3w:0,leanG:0,leanW:0,games:new Set()};
    const d = byDate[p.date];
    d.plays++;
    if (p.match) d.games.add(p.match);
    const lean = isLean(p);
    if (p.result==='WIN'||p.result==='LOSS') {
      if (lean) {
        // Track LEAN accuracy separately — excluded from tier/overall counts
        d.leanG++; if (p.result==='WIN') d.leanW++;
      } else {
        d.graded++;
        if (p.result==='WIN') d.wins++; else d.losses++;
        if (p.tier===1){d.t1++;if(p.result==='WIN')d.t1w++;}
        else if(p.tier===2){d.t2++;if(p.result==='WIN')d.t2w++;}
        else{d.t3++;if(p.result==='WIN')d.t3w++;}
      }
    }
  });
  return Object.values(byDate).map(d=>({...d,games:d.games.size,hr:d.graded?+(d.wins/d.graded*100).toFixed(1):0,leanHR:d.leanG?+(d.leanW/d.leanG*100).toFixed(1):null})).sort((a,b)=>a.date.localeCompare(b.date));
}

// ─── SPARKLINE ───
function spark(d,ln,homes,w,h=40) {
  if(!d||d.length<2) return '';
  const W=w||'100%', isFullW=(w==null);
  const fixW=isFullW?340:W;
  const ds=d.slice(-20), hs=homes?homes.slice(-20):[];
  const n=ds.length,pad=5,top=4,bot=4, cw=fixW-pad*2,ch=h-top-bot;
  const mn=Math.min(...ds,ln)-1,mx=Math.max(...ds,ln)+1,rn=mx-mn||1;
  const x=i=>pad+(n<2?cw/2:(i/(n-1))*cw), y=v=>top+(1-(v-mn)/rn)*ch;
  const ly=y(ln), HIT='#2dd4bf',MISS='#e879f9',HITR='45,212,191',MISSR='232,121,249',LINE='#fbbf24',HOMEC='#60a5fa';
  const p=[];
  p.push(`<defs><filter id="gh" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="gm" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`);
  const hitN=ds.filter(v=>v>ln).length,majority=hitN>=n/2,aRGB=majority?HITR:MISSR;
  let area=`M${x(0)},${ly}`;
  ds.forEach((v,i)=>{area+=` L${x(i)},${y(v)}`;});
  area+=` L${x(n-1)},${ly} Z`;
  p.push(`<path d="${area}" fill="rgba(${aRGB},.13)" stroke="none"/>`);
  p.push(`<line x1="${pad}" y1="${ly}" x2="${pad+cw}" y2="${ly}" stroke="${LINE}" stroke-width="1.2" stroke-dasharray="5,3" opacity=".75"/>`);
  const pts=ds.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  p.push(`<polyline points="${pts}" fill="none" stroke="rgba(226,232,240,.2)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>`);
  ds.forEach((v,i)=>{
    const cx=x(i),cy=y(v),hit=v>ln,fill=hit?HIT:MISS,gid=hit?'gh':'gm';
    const isMost=i===n-1,isHome=hs[i]===true;
    if(isMost){p.push(`<circle cx="${cx}" cy="${cy}" r="7" fill="${fill}" filter="url(#${gid})" opacity=".18"/><circle cx="${cx}" cy="${cy}" r="4.5" fill="${fill}" opacity=".35"/><circle cx="${cx}" cy="${cy}" r="3" fill="${fill}"/>`);}
    else{p.push(`<circle cx="${cx}" cy="${cy}" r="${hit?2.8:2.2}" fill="${fill}" opacity="${hit?.88:.65}"/>`);}
    if(isHome&&!isMost) p.push(`<circle cx="${cx}" cy="${cy}" r="4.2" fill="none" stroke="${HOMEC}" stroke-width=".8" opacity=".38"/>`);
  });
  const svgW=isFullW?'100%':W;
  return `<svg width="${svgW}" height="${h}" ${isFullW?'viewBox="0 0 340 '+h+'" preserveAspectRatio="none"':''} style="display:block">${p.join('')}</svg>`;
}

// ─── MAIN RENDER ───
function render() {
  const DS=computeSeasonStats(), dates=allDates();
  if(di<0) di=0; if(di>=dates.length) di=dates.length-1;

  let totalPlays=0,totalGraded=0,totalWins=0,totalT1=0,totalT1W=0,totalT2=0,totalT2W=0,totalT3=0,totalT3W=0,totalLeanG=0,totalLeanW=0;
  DS.forEach(d=>{totalPlays+=d.plays;totalGraded+=d.graded;totalWins+=d.wins;totalT1+=d.t1;totalT1W+=d.t1w;totalT2+=d.t2;totalT2W+=d.t2w;totalT3+=d.t3;totalT3W+=d.t3w;totalLeanG+=(d.leanG||0);totalLeanW+=(d.leanW||0);});
  const seasonHR=totalGraded?(totalWins/totalGraded*100).toFixed(1):'0.0';
  const leanHR=totalLeanG?(totalLeanW/totalLeanG*100).toFixed(1):null;
  const _cdAll=P.filter(p=>p.date===curDate);
  const _cdGraded=_cdAll.filter(p=>p.result==='WIN'||p.result==='LOSS').length;
  const _cdActive=_cdAll.filter(p=>!isVoid(p)).length;
  const _cdStatus=_cdGraded>0&&_cdActive>0&&_cdGraded>=_cdActive*.8?'Completed':'Pre-Match';
  const _cdStatusC=_cdStatus==='Completed'?'var(--gr)':'var(--yl)';
  const _byP={};
  P.forEach(p=>{
    if(!['WIN','LOSS'].includes(p.result)) return;
    if(!_byP[p.player]) _byP[p.player]={name:p.player,team:p.team||'',plays:0,wins:0,t1:0,t2:0,t3:0,totalDelta:0,deltaCount:0};
    const lp=_byP[p.player];
    lp.plays++;if(p.result==='WIN')lp.wins++;
    if(p.tier===1)lp.t1++;else if(p.tier===2)lp.t2++;else lp.t3++;
    if(p.delta!=null){lp.totalDelta+=Math.abs(p.delta);lp.deltaCount++;}
  });
  const _allLdrs=Object.values(_byP).filter(x=>x.plays>=5).sort((a,b)=>(b.wins/b.plays)-(a.wins/a.plays));
  window.leaderRanks={}; window.leaderData={};
  _allLdrs.forEach((l,i)=>{window.leaderRanks[l.name]=i+1;window.leaderData[l.name]=l;});

  let h='';
  h+=`<div class="hdr"><div>
    <div class="hdr-t">PropEdge V17.0</div>
    <div class="hdr-s">${totalGraded.toLocaleString()} graded &middot; <span style="color:${hrc(+seasonHR)}">${seasonHR}% HR</span> &middot; ${totalLeanG?totalLeanG+' lean &middot; ':''}${curSeason} &middot; <span style="color:${_cdStatusC}">${_cdStatus}</span></div>
  </div><div class="logo">PE</div></div>`;
  h+=`<div class="season-toggle">
    <div class="season-btn ${curSeason==='2024-25'?'active':''}" onclick="loadSeason('2024-25')">2024-25</div>
    <div class="season-btn ${curSeason==='2026-27'?'active':''}" onclick="loadSeason('2026-27')">2025-26</div>
  </div>`;
  h+=`<div class="tabs">${['daily','season','leaders','stats'].map(t=>`<div class="tb ${tab===t?'on':''}" onclick="tab='${t}';render()">${t[0].toUpperCase()+t.slice(1)}</div>`).join('')}</div>`;

  // STRIP — excludes LEAN from HR/T1/T2, shows Lean separately
  const ultraG=P.filter(p=>p.tierLabel==='T1_ULTRA'&&(p.result==='WIN'||p.result==='LOSS')&&!isLean(p));
  const ultraW=ultraG.filter(p=>p.result==='WIN').length;
  const leanStrip=leanHR!=null?leanHR+'%':'—';
  h+=`<div class="strip">${[
    ['Plays',totalPlays.toLocaleString()],
    ['Graded',totalGraded.toLocaleString()],
    ['W/L',totalWins+'/'+(totalGraded-totalWins)],
    ['HR',seasonHR+'%'],
    ['T1 HR',totalT1?(totalT1W/totalT1*100).toFixed(1)+'%':'—'],
    ['T2 HR',totalT2?(totalT2W/totalT2*100).toFixed(1)+'%':'—'],
    ['Lean',leanStrip]
  ].map((s,i,a)=>`<div class="si"><div class="si-v" style="${s[0]==='Lean'?'color:var(--tx3);font-size:12px':''}">${s[1]}</div><div class="si-l">${s[0]}</div></div>${i<a.length-1?'<div class="sdiv"></div>':''}`).join('')}</div>`;

  if(tab==='daily')   h+=renderDaily(DS,dates,curDate);
  else if(tab==='season')  h+=renderSeason(DS);
  else if(tab==='leaders') h+=renderLeaders(_allLdrs);
  else if(tab==='stats')   h+=renderStats(DS,totalPlays,totalGraded,totalWins,totalT1,totalT1W,totalT2,totalT2W,totalT3,totalT3W);

  h+=`<div class="ft"><strong style="color:var(--tx2)">PropEdge V17.0</strong> &middot; Triple-engine Adaptive Fusion &middot; T1_ULTRA ≥73% (3u) &middot; T1 ≥63% (2u) &middot; T2 ≥56% (1u) &middot; Engine conflict → LEAN &middot; ${curSeason}</div>`;
  document.getElementById('app').innerHTML=h;
}

// ─── DAILY TAB ───
function renderDaily(DS,dates,curDate) {
  let h='';
  const months=[...new Set(dates.map(d=>d.slice(0,7)))].sort();
  h+=`<div class="mscr">${months.map(m=>{const[y,mo]=m.split('-');const lbl=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'short'});return`<div class="mon ${selMon===m?'on':''}" onclick="selMon='${m}';jumpToMonth('${m}');render()">${lbl}</div>`;}).join('')}</div>`;

  const calDs=DS.filter(d=>d.date.startsWith(selMon)).slice(-7);
  h+=`<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
    <div class="mon" style="padding:4px 8px;font-size:11px;flex-shrink:0;${di<=0?'opacity:.35;cursor:default':'cursor:pointer'}" onclick="if(di>0){di--;selMon=dates[di].slice(0,7);fMatch='all';render()}">&#9664;</div>
    <div class="dcal" style="flex:1">`;
  calDs.forEach(d=>{
    const dObj=new Date(d.date+'T12:00:00');
    const dow=dObj.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase().slice(0,3);
    const dom=dObj.getDate(), isAct=d.date===curDate;
    const hr=d.graded?d.wins/d.graded:0;
    const wlC=d.graded?(hr>=.55?'var(--gr)':hr>=.45?'var(--yl)':'var(--rd)'):'var(--tx4)';
    const dIdx=dates.indexOf(d.date);
    h+=`<div class="dday ${isAct?'on':''}" onclick="if(${dIdx}>=0){di=${dIdx};selMon='${d.date.slice(0,7)}';fMatch='all';render()}">
      <div class="dow">${dow}</div><div class="dnum">${dom}</div>
      <div class="dwl" style="color:${wlC}">${d.graded?d.wins+'W/'+(d.graded-d.wins)+'L':d.plays?'<span style="color:var(--bl);font-size:6px">'+d.plays+'&#9658;</span>':'&mdash;'}</div>
    </div>`;
  });
  h+=`</div>
    <div class="mon" style="padding:4px 8px;font-size:11px;flex-shrink:0;${di>=dates.length-1?'opacity:.35;cursor:default':'cursor:pointer'}" onclick="if(di<dates.length-1){di++;selMon=dates[di].slice(0,7);fMatch='all';render()}">&#9654;</div>
  </div>`;

  const dayAll=P.filter(p=>p.date===curDate);
  const voids=dayAll.filter(p=>isVoid(p));
  const valid=dayAll.filter(p=>!isVoid(p));

  // Accounting model: Total = Graded + Lean + DNP + Pending
  // Graded = WIN/LOSS and NOT lean direction → ties with T1+T2+T3
  // Lean   = direction is LEAN (graded or pending)
  // DNP    = confirmed did not play
  // Pending = no result, not lean, not DNP
  const dayDNP     = valid.filter(p=>isDNP(p));
  const dayLean    = valid.filter(p=>isLean(p)&&!isDNP(p));
  const dayGraded  = valid.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)&&!isDNP(p));
  const dayPending = valid.filter(p=>!isDNP(p)&&!isLean(p)&&p.result!=='WIN'&&p.result!=='LOSS');
  const dayWins    = dayGraded.filter(p=>p.result==='WIN').length;
  const leanGraded = dayLean.filter(p=>p.result==='WIN'||p.result==='LOSS');
  const leanWins   = leanGraded.filter(p=>p.result==='WIN').length;
  const gm=[...new Set(valid.map(p=>p.match))];

  else if(srt==='line')   fl.sort((a,b)=>(b.line||0)-(a.line||0));
  else if(srt==='result') fl.sort((a,b)=>{const ro={WIN:0,LOSS:1};return(ro[a.result]??2)-(ro[b.result]??2)||b.conf-a.conf;});
  else if(srt==='odds'){fl.sort((a,b)=>{const ao=parseFloat((a.dir==='OVER'||a.dir==='LEAN OVER'?a.overOdds:a.underOdds)||0),bo=parseFloat((b.dir==='OVER'||b.dir==='LEAN OVER'?b.overOdds:b.underOdds)||0);return bo-ao;});}
  else fl.sort((a,b)=>(b.date||'').localeCompare(a.date||'')||a.tier-b.tier||b.conf-a.conf);

  const dLbl=curDate?new Date(curDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
  const _fcLean=fl.filter(p=>isLean(p)&&!isDNP(p)).length;
  const _fcDNP2=fl.filter(p=>isDNP(p)).length;
  const _fcCore=fl.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&!isLean(p)&&!isDNP(p)).length;
  const _fcPend=fl.filter(p=>!isDNP(p)&&!isLean(p)&&p.result!=='WIN'&&p.result!=='LOSS').length;
  h+=`<div class="pcount">${fl.length} shown · ${_fcCore} graded · ${_fcLean} lean · ${_fcDNP2} DNP${_fcPend?' · '+_fcPend+' pending':''}${isPreGame?' · <span style="color:var(--bl)">Pre-game</span>':''} · Tap to expand</div>`;
  if(!fl.length) h+=`<div class="ld">No plays match filters</div>`;
  else fl.forEach(p=>{h+=card(p);});
  return h;
}

// ─── PLAY CARD ───
function card(p) {
  const dirOver=p.dir==='OVER'||p.dir==='LEAN OVER';
  const dirUnder=p.dir==='UNDER'||p.dir==='LEAN UNDER';

  const dl=p.dir==='NO PLAY'?(p.rawDir||'—'):p.dir;
  const k=p.player+'_'+p.date+'_'+p.line;
  const o=exp.has(k);
  const flagC=(p.flags||0)>=8?'var(--gr)':(p.flags||0)>=6?'var(--yl)':'var(--rd)';
  const void_=isVoid(p);

  let h=`<div class="cd ${bdr} ${void_?'vd':''} ${isDNP(p)?'vd':''} ${lean?'lean':''}" onclick="tgl('${k.replace(/'/g,"\\'")}')">`;

  // TOP ROW
  const homeIcon=p.isHome===true?'<span style="font-size:14px;line-height:1">🏠</span>':p.isHome===false?'<span style="font-size:14px;line-height:1">✈️</span>':'';

  // V14: engine split badge
  const engBadge=p.enginesAgree===false?'<span style="font:700 7px var(--M);padding:1px 5px;border-radius:4px;background:rgba(239,68,68,.12);color:var(--rd)">SPLIT</span>':'';

  h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <span style="font:700 8px var(--M);padding:1px 6px;border-radius:6px;background:${dBg};color:${dC}">${dl}</span>
        <span style="font:600 13px var(--S)">${p.player}</span>
        ${p.team&&p.team!=='undefined'&&p.team!==''?`<span style="font:700 8px var(--M);padding:1px 5px;border-radius:4px;background:rgba(56,189,248,.1);color:var(--bl)">${p.team}</span>`:''}
        ${homeIcon} ${_rkBadge} ${tierBadge(p)}
        <span style="font:700 8px var(--M);padding:2px 5px;border-radius:4px;background:rgba(56,189,248,.07);color:${flagC}">${p.flagsStr||'—'}</span>
        ${engBadge}
        ${p.avail&&p.avail!=='OK'?`<span style="font:600 7px var(--M);padding:2px 5px;border-radius:4px;background:var(--rdA);color:var(--rd)">${p.avail}</span>`:''}
        ${(()=>{
          if(!Array.isArray(p.recent20)||!p.recent20dates||!p.recent20dates.length) return '';
          const lastD=p.recent20dates[p.recent20dates.length-1];
          if(!lastD) return '';
          const fmtD2=d=>{try{const dt=new Date(d+'T12:00:00');return dt.getDate().toString().padStart(2,'0')+' '+dt.toLocaleString('en-GB',{month:'short'});}catch(e){return d.slice(5)||'';}};
          if(isDNP(p)) return `<span class="last-tag last-dnp">DNP ${fmtD2(lastD)}</span>`;
          return `<span class="last-tag last-ok">▶ Played ${fmtD2(lastD)}</span>`;
        })()}
      </div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:2px">
        <span style="font:400 9px var(--S);color:var(--tx2)">${p.match}${p.gameTime?' &middot; '+p.gameTime:''}</span>
        ${posLabel(p)?`<span style="font:400 8px var(--S);color:var(--tx3)">${posLabel(p)}</span>`:''}
        <span style="font:400 9px var(--S);color:var(--tx3)">${Math.round(p.conf*100)}% conf</span>
        ${p.predPts!=null?`<span style="font:500 8px var(--M);padding:1px 5px;border-radius:4px;background:rgba(99,102,241,.1);color:var(--accent)">Model: ${p.predPts.toFixed(1)} pts</span>`:''}
        ${p.predGap!=null?`<span style="font:500 7px var(--M);color:${p.predGap>=3?'var(--gr)':p.predGap>=1.5?'var(--yl)':'var(--tx3)'}">gap: ${p.predGap.toFixed(1)}</span>`:''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;margin-left:8px;flex-shrink:0">`;

  if(isDNP(p)){h+=`<span style="font:700 9px var(--M);padding:3px 8px;border-radius:5px;background:rgba(245,158,11,.15);color:var(--yl);border:1px solid rgba(245,158,11,.35)">DNP</span>`;}
  else if(void_){h+=`<span style="font:700 9px var(--M);padding:2px 7px;border-radius:5px;background:var(--bg2);color:var(--tx4)">VOID</span>`;}
  else if(p.result==='WIN'){h+=`<span style="font:800 11px var(--M);padding:4px 11px;border-radius:7px;background:var(--grA);color:var(--gr);letter-spacing:.5px">WIN</span>`;if(p.delta!=null)h+=`<span style="font:500 9px var(--M);color:var(--gr)">${p.delta>0?'+':''}${p.delta}</span>`;}
  else if(p.result==='LOSS'){h+=`<span style="font:800 11px var(--M);padding:4px 11px;border-radius:7px;background:var(--rdA);color:var(--rd);letter-spacing:.5px">LOSS</span>`;if(p.delta!=null)h+=`<span style="font:500 9px var(--M);color:var(--rd)">${p.delta>0?'+':''}${p.delta}</span>`;}

  // STATS + SPARKLINE ROW — Odds as decimal
  const lhArr=p.lineHistory;
  const _amToDec=am=>{const n=parseFloat(am);if(!n||isNaN(n))return null;return n>0?(+(n/100+1).toFixed(2)):(+(100/Math.abs(n)+1).toFixed(2));};
  const _rawOdds=dirOver?p.overOdds:p.underOdds;

  h+=`<div style="display:flex;align-items:center;gap:7px;margin-top:7px">

    <div class="kv"><div class="kv-l">Odds</div><div class="kv-v" style="font-size:11px;color:var(--tx2)">${_oddsDisp}</div></div>
    <div style="margin-left:auto;flex-shrink:0">${spark(p.recent20||[],p.line,p.recent20homes||[])}</div>
  </div>`;

  // CONFIDENCE BAR
  const cfBlocks=10, cfFilled=Math.round(Math.max(0,Math.min(10,((p.conf-.45)/.4)*10))), cfC=cfc(p.conf);
  h+=`<div style="display:flex;align-items:center;gap:5px;margin-top:6px">
    <span style="font:400 6px var(--M);color:var(--tx4);text-transform:uppercase;letter-spacing:.3px">Conf</span>
    <div style="display:flex;gap:2px;flex:1;align-items:center">
      ${Array.from({length:cfBlocks},(_,i)=>i<cfFilled?`<div style="flex:1;height:7px;border-radius:2px;background:${cfC};opacity:${0.5+i/cfBlocks*0.5}"></div>`:`<div style="flex:1;height:7px;border-radius:2px;background:var(--bg2);border:1px solid rgba(255,255,255,.04)"></div>`).join('')}
      <span style="font:700 10px var(--M);color:${cfC};margin-left:1px">▶</span>
    </div>
    <span style="font:700 9px var(--M);color:${cfC};min-width:28px;text-align:right">${Math.round(p.conf*100)}%</span>
  </div>`;

  // RECENT SCORES — single scrollable row, DD-MMM dates, no wrap
  const scRaw=(Array.isArray(p.recent20)?p.recent20:[]).slice(0,20);
  const scHRaw=p.recent20homes||[];
  const scDRaw=p.recent20dates||[];
  const sc=[...scRaw].reverse(), scH=[...scHRaw].reverse(), scD=[...scDRaw].reverse();
  function _fmtD(ds){if(!ds)return'';try{const d=new Date(ds+'T12:00:00');return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-GB',{month:'short'});}catch(e){return ds.slice(5)||'';}}
  if(sc.length){
    const pills=sc.map((v,i)=>{
      const venue=i<scH.length?(scH[i]===true?'🏠':'✈️'):'';
      const dt=i<scD.length?_fmtD(scD[i]):'';
      const bg=v>p.line?'rgba(45,212,191,.12)':'rgba(232,121,249,.1)';
      const clrv=v>p.line?'#2dd4bf':'#e879f9';
      return`<div class="pill-item"><div class="pill-dt">${dt}</div><div class="pill-vn">${venue||'·'}</div><div class="pill-v" style="background:${bg};color:${clrv}">${v}</div></div>`;
    }).join('');
    h+=`<div style="display:flex;align-items:flex-end;gap:3px;margin-top:6px">

    </div>`;
  }

  // ── EXPANDED ──
  if(o) {
    h+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bg2);animation:fadeIn .2s ease-out">`;
    if(p.fullMatch) h+=`<div style="font:400 9px var(--S);color:var(--tx3);margin-bottom:8px">📍 ${p.fullMatch}${p.gameTime?' &middot; '+p.gameTime:''}</div>`;

    if(p.preMatchReason) h+=`<div class="rsn" style="border-left:2px solid var(--bl)"><strong style="color:var(--bl);font-size:9px">📊 MODEL ANALYSIS</strong><br>${p.preMatchReason}</div>`;

    // MODEL PREDICTION PANEL
    if(p.predPts!=null){
      const gapC=p.predGap>=3?'var(--gr)':p.predGap>=1.5?'var(--yl)':'var(--tx3)';

        ${p.calProb!=null?`<div style="font:400 9px var(--S);color:var(--tx3);margin-top:3px">Clf: <strong style="color:var(--vi)">${(p.calProb*100).toFixed(0)}%</strong> &middot; <span style="color:${p.enginesAgree===false?'var(--rd)':'var(--gr)'}">Engines: ${p.enginesAgree===false?'SPLIT ⚡':'AGREE ✓'}</span></div>`:''}
      </div>`;
    }

    // ── SPARKLINE — FULLY INTERACTIVE ──
    {

      // full-width sparkline

        const _bmC=_beatChosen/_tot2>=.6?'var(--gr)':_beatChosen/_tot2<.5?'var(--rd)':'var(--yl)';

        h+='<div style="display:flex;gap:8px;padding:4px 8px;background:var(--bg);border-radius:6px;border:1px solid var(--bg2);align-items:center;flex-wrap:wrap;margin-bottom:5px;font:400 8px var(--S);color:var(--tx3)">';
        h+='Beat '+_cmpLine+': <span style="font:700 9px var(--M);color:'+_bmC+'">'+_beatChosen+'/'+_tot2+' ('+(_beatChosen/_tot2*100).toFixed(0)+'%)</span>';
        if(_cmpLine!==p.line)h+=' &nbsp;vs prop '+p.line+': <span style="font:700 9px var(--M);color:'+_bpC+'">'+_beatProp2+'/'+_tot2+' ('+(_beatProp2/_tot2*100).toFixed(0)+'%)</span>';
        h+='</div>';
      }
    }

    // ── DECISION SIGNALS (10) ──
    h+='<div class="sec">Decision Signals</div><div class="dsig">';
    const _ds=[
      [p.usage_l10!=null,(p.usage_l10||0)>(p.usage_l30||0)?'var(--gr)':'var(--rd)','Usage '+((p.usage_l10||0)*100).toFixed(0)+'% '+((p.usage_l10||0)>(p.usage_l30||0)?'&#9650;':'&#9660;')+'L10'],
      [p.min_cv!=null,(p.min_cv||0)>0.2?'var(--yl)':'var(--gr)','Min CV '+(p.min_cv!=null?p.min_cv.toFixed(2):'—')+((p.min_cv||0)>0.2?' volatile':'')],

      [p.level_ewm!=null,(p.level_ewm||0)>(p.l10||0)?'var(--gr)':'var(--rd)','EWM '+(p.level_ewm!=null?p.level_ewm.toFixed(1):'—')+' vs L10 '+((p.level_ewm||0)>(p.l10||0)?'&#9650;':'&#9660;')],
      [p.home_away_split!=null,(p.home_away_split||0)>1?'var(--gr)':(p.home_away_split||0)<-1?'var(--rd)':'var(--tx3)','Home '+(p.homeAvgPts!=null?p.homeAvgPts.toFixed(1):'—')+' Away '+(p.awayAvgPts!=null?p.awayAvgPts.toFixed(1):'—')],
      [p.is_long_rest!=null,p.is_long_rest?'var(--yl)':'var(--tx3)','Long rest: '+(p.is_long_rest?'yes':'no')+(p.rest_days!=null?' ('+p.rest_days+'d)':'')],

// ─── SEASON TAB ───
function renderSeason(DS) {
  let h='';
  const months=[...new Set(DS.map(d=>d.date.slice(0,7)))].sort().reverse();
  months.forEach(m=>{
    const mDs=DS.filter(d=>d.date.startsWith(m));
    const mg=mDs.reduce((s,d)=>s+d.graded,0),mw=mDs.reduce((s,d)=>s+d.wins,0);
    const mt1=mDs.reduce((s,d)=>s+d.t1,0),mt1w=mDs.reduce((s,d)=>s+d.t1w,0);
    const mt2=mDs.reduce((s,d)=>s+d.t2,0),mt2w=mDs.reduce((s,d)=>s+d.t2w,0);
    const mt3=mDs.reduce((s,d)=>s+d.t3,0),mt3w=mDs.reduce((s,d)=>s+d.t3w,0);
    const mhr=mg?(mw/mg*100).toFixed(1):'—';
    const[y,mo]=m.split('-');
    const mLbl=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const hrC=mg&&mw/mg>=.55?'var(--gr)':mg&&mw/mg<.5?'var(--rd)':'var(--yl)';
    h+=`<div class="mcrd">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

        <span style="font:700 14px var(--M);color:${hrC}">${mhr}%</span>
      </div>
      <div class="g4">${[
        ['W/L',mw+'W/'+(mg-mw)+'L','var(--tx)'],
        ['T1 HR',mt1?(mt1w/mt1*100).toFixed(1)+'%':'—','var(--yl)'],
        ['T2 HR',mt2?(mt2w/mt2*100).toFixed(1)+'%':'—','var(--tier2)'],
        ['Lean HR',(()=>{const mlg=mDs.reduce((s,d)=>s+(d.leanG||0),0),mlw=mDs.reduce((s,d)=>s+(d.leanW||0),0);return mlg?(mlw/mlg*100).toFixed(0)+'%':'—';})(),'var(--tx3)']
      ].map(([l,v,c])=>`<div class="kv"><div class="kv-l">${l}</div><div class="kv-v" style="color:${c};font-size:12px">${v}</div></div>`).join('')}</div>
      <div style="font:600 7px var(--M);color:var(--tx4);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px">Daily Heatmap — tap day to view</div>
      <div class="hmap">${mDs.map(d=>{
        const hr2=d.graded?d.wins/d.graded:-1;
        const bg=hr2<0?'var(--bg2)':hr2>=.65?'#15803d':hr2>=.55?'#166534':hr2>=.5?'#854d0e':hr2>=.45?'#991b1b':'#450a0a';
        const dIdx=allDates().indexOf(d.date);
        return`<div class="hcel" style="background:${bg}" title="${d.date}: ${d.graded?d.wins+'W/'+(d.graded-d.wins)+'L ('+(d.graded?(d.wins/d.graded*100).toFixed(0)+'%':'')+')'  :'No data'}" onclick="if(${dIdx}>=0){tab='daily';di=${dIdx};selMon='${m}';render()}"></div>`;
      }).join('')}</div>
    </div>`;
  });
  return h;
}

// ─── LEADERS TAB ───
function renderLeaders(_allLdrs) {
  let h='';
  const _lSearch=fSearch.trim().toLowerCase();
  const ldrs=_lSearch?_allLdrs.filter(l=>l.name.toLowerCase().includes(_lSearch)||(l.team||'').toLowerCase().includes(_lSearch)):_allLdrs.slice(0,100);
  h+=`<div style="font:600 7px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">${_lSearch?'Search results':'Top 100'} HR Leaders &middot; Min 5 Plays &middot; ${_allLdrs.length} total</div>`;
  h+=`<div style="margin-bottom:10px"><input type="search" placeholder="Search player or team..." value="${_lSearch}" oninput="fSearch=this.value;render()" style="width:100%;box-sizing:border-box;padding:7px 11px;border-radius:9px;border:1px solid var(--bg2);background:var(--bg1);color:var(--tx);font:400 12px var(--S);outline:none"/></div>`;
  // SPLIT LEADERBOARD: Prop HR | Min Line HR
  const _minLdrs=Object.values(P.reduce((acc,p)=>{
    if(!p.min_line||p.actualPts==null||!(p.result==='WIN'||p.result==='LOSS')||isLean(p)||isDNP(p))return acc;
    if(!acc[p.player])acc[p.player]={name:p.player,g:0,w:0};
    acc[p.player].g++;if(p.actualPts>p.min_line)acc[p.player].w++;
    return acc;
  },{})).filter(x=>x.g>=5).sort((a,b)=>(b.w/b.g)-(a.w/a.g)).slice(0,10);
  const _propTop=_allLdrs.slice(0,10);
  if(_propTop.length||_minLdrs.length){
    h+=`<div class="lb-grid">
      <div class="lb-col">
        <div class="lb-hdr" style="color:var(--gr)">Prop Line HR</div>
        ${_propTop.map((l,i)=>{const hr=(l.wins/l.plays*100).toFixed(0)+'%';const hrc2=l.wins/l.plays>=.6?'var(--gr)':l.wins/l.plays>=.55?'var(--yl)':'var(--tx)';return`<div class="lb-row"><span style="color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px">${l.name}</span><span class="lb-v" style="color:${hrc2}">${hr}<span class="lb-ct">${l.wins}/${l.plays}</span></span></div>`;}).join('')}
      </div>
      <div class="lb-col">
        <div class="lb-hdr" style="color:var(--bl)">Min Line HR</div>
        ${_minLdrs.map(l=>{const hr=(l.w/l.g*100).toFixed(0)+'%';const hrc2=l.w/l.g>=.6?'var(--gr)':l.w/l.g>=.55?'var(--yl)':'var(--tx)';return`<div class="lb-row"><span style="color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px">${l.name}</span><span class="lb-v" style="color:${hrc2}">${hr}<span class="lb-ct">${l.w}/${l.g}</span></span></div>`;}).join('')}
      </div>
    </div>`;
  }
  ldrs.forEach((l,idx)=>{
    const i=_allLdrs.indexOf(l);
    const hr2=(l.wins/l.plays*100).toFixed(1);
    const hrC=+hr2>=60?'var(--gr)':+hr2>=55?'var(--yl)':'var(--tx)';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const rankC=i<10?'var(--yl)':'var(--tx3)';
    const isExp=leaderExp.has(l.name);
    const avgDelta=l.deltaCount>0?(l.totalDelta/l.deltaCount).toFixed(1):'—';
    h+=`<div class="lrow ${isExp?'lrow-expanded':''}" onclick="toggleLeader('${l.name.replace(/'/g,"\\'")}')">
      <div style="font:700 11px var(--M);color:${rankC};width:22px;text-align:center;flex-shrink:0">${medal||(i+1)}</div>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="display:flex;align-items:center;gap:4px;overflow:hidden">
          <span style="font:600 12px var(--S);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.name}</span>
          ${l.team?`<span style="font:500 7px var(--M);color:var(--tx4);padding:1px 4px;border-radius:3px;background:var(--bg2);flex-shrink:0">${l.team}</span>`:''}
        </div>
        <div style="font:400 9px var(--S);color:var(--tx3);margin-top:1px">${l.t1?l.t1+'T1 · ':''}${l.t2?l.t2+'T2 · ':''}${l.t3?l.t3+'T3 · ':''}${l.plays} plays · Avg Δ: ${avgDelta}</div>
        ${isExp?renderLeaderDrill(l):''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font:700 15px var(--M);color:${hrC}">${hr2}%</div>
        <div style="font:400 8px var(--M);color:var(--tx4)">${l.wins}W/${l.plays-l.wins}L</div>
      </div>
    </div>`;
  });
  if(!ldrs.length) h+=`<div class="ld">No players match search</div>`;
  return h;
}

function renderLeaderDrill(l) {
  const playerPlays=P.filter(p=>p.player===l.name&&(p.result==='WIN'||p.result==='LOSS')).sort((a,b)=>b.date.localeCompare(a.date));
  const showAll=leaderShowAll.has(l.name);
  const display=showAll?playerPlays:playerPlays.slice(0,10);
  let h=`<div class="drill" onclick="event.stopPropagation()">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px">Recent Props &middot; ${l.plays} total &middot; ${l.wins}W/${l.plays-l.wins}L &middot; ${(l.wins/l.plays*100).toFixed(1)}% HR</div>`;
  display.forEach(p=>{
    const resC=p.result==='WIN'?'var(--gr)':'var(--rd)';
    const dirC=(p.dir==='OVER'||p.dir==='LEAN OVER')?'var(--ov)':'var(--un)';
    h+=`<div class="drill-row">
      <span style="color:var(--tx3);font:400 9px var(--M);min-width:52px">${p.date.slice(5)}</span>
      <span style="color:var(--tx2);font:400 9px var(--S);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.match}</span>
      <span style="color:${dirC};font:600 8px var(--M);min-width:36px;text-align:center">${p.dir}</span>
      <span style="font:500 9px var(--M);min-width:28px;text-align:center">${p.line}</span>
      ${tierBadge(p)}
      <span style="font:700 9px var(--M);color:${resC};min-width:32px;text-align:right">${p.result}${p.delta!=null?' '+(p.delta>0?'+':'')+p.delta:''}</span>
    </div>`;
  });
  if(playerPlays.length>10&&!showAll){
    h+=`<div style="text-align:center;margin-top:6px"><span style="font:500 9px var(--M);color:var(--bl);cursor:pointer;padding:4px 12px;border-radius:6px;background:var(--blA);border:1px solid rgba(56,189,248,.25)" onclick="event.stopPropagation();leaderShowAll.add('${l.name.replace(/'/g,"\\'")}');render()">View All ${playerPlays.length} Props</span></div>`;
  }
  h+=`</div>`;
  return h;
}

// ─── STATS TAB ───
function renderStats(DS,totalPlays,totalGraded,totalWins,totalT1,totalT1W,totalT2,totalT2W,totalT3,totalT3W) {
  let h='';
  const seasonHR=totalGraded?(totalWins/totalGraded*100).toFixed(1):'0.0';
  // ULTRA/PREM/tier breakdown — all exclude LEAN
  const ultraG=P.filter(p=>p.tierLabel==='T1_ULTRA'&&(p.result==='WIN'||p.result==='LOSS')&&!isLean(p));
  const ultraW=ultraG.filter(p=>p.result==='WIN').length;
  const premG=P.filter(p=>p.tierLabel==='T1_PREMIUM'&&(p.result==='WIN'||p.result==='LOSS')&&!isLean(p));
  const premW=premG.filter(p=>p.result==='WIN').length;
  // LEAN — tracked separately
  const leanAllG=P.filter(p=>isLean(p)&&(p.result==='WIN'||p.result==='LOSS'));
  const leanAllW=leanAllG.filter(p=>p.result==='WIN').length;
  const leanOverG=leanAllG.filter(p=>p.dir==='LEAN OVER');
  const leanOverW=leanOverG.filter(p=>p.result==='WIN').length;
  const leanUnderG=leanAllG.filter(p=>p.dir==='LEAN UNDER');
  const leanUnderW=leanUnderG.filter(p=>p.result==='WIN').length;
  const leanHRs=leanAllG.length?(leanAllW/leanAllG.length*100).toFixed(1):'—';
  const leanHRc=leanAllG.length?(+leanHRs>=55?'var(--gr)':+leanHRs<50?'var(--rd)':'var(--yl)'):'var(--tx3)';

  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Season Overview — ${curSeason} <span style="color:var(--tx4);font-size:6px;letter-spacing:.3px">(LEAN excluded)</span></div>
    <div class="g4">
      <div class="kv"><div class="kv-l">Total Plays</div><div class="kv-v" style="font-size:13px">${totalPlays.toLocaleString()}</div></div>
      <div class="kv"><div class="kv-l">Graded</div><div class="kv-v" style="font-size:13px">${totalGraded.toLocaleString()}</div></div>
      <div class="kv"><div class="kv-l">W / L</div><div class="kv-v" style="font-size:13px">${totalWins} / ${totalGraded-totalWins}</div></div>
      <div class="kv"><div class="kv-l">HR%</div><div class="kv-v" style="color:${hrc(+seasonHR)};font-size:13px">${seasonHR}%</div></div>
    </div>
    <div class="stat-bar"><div class="stat-fill" style="width:${seasonHR}%;background:${hrc(+seasonHR)}"></div></div>
  </div>`;

  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Tier Breakdown <span style="color:var(--tx4);font-size:6px;letter-spacing:.3px">(LEAN excluded)</span></div>
    ${[
      ['T1 (ULTRA)',      ultraG.length, ultraW,  ultraG.length?(ultraW/ultraG.length*100).toFixed(1):'0.0', 'var(--yl)'],
      ['T1 (PREMIUM)',    premG.length,  premW,   premG.length?(premW/premG.length*100).toFixed(1):'0.0',  'var(--yl)'],
      ['T1 (All)',        totalT1,       totalT1W, totalT1?(totalT1W/totalT1*100).toFixed(1):'0.0',       'var(--yl)'],
      ['T2 (Standard)',   totalT2,       totalT2W, totalT2?(totalT2W/totalT2*100).toFixed(1):'0.0',       'var(--tier2)'],
      ['T3 (Speculative)',totalT3,       totalT3W, totalT3?(totalT3W/totalT3*100).toFixed(1):'0.0',       'var(--tier3)']
    ].map(([label,total,wins,hr,c])=>`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font:500 10px var(--S);color:${c}">${label}</span>
        <span style="font:400 9px var(--S);color:var(--tx3)">${total} plays · ${wins}W/${total-wins}L</span>
        <span style="font:700 10px var(--M);color:${c}">${hr}%</span>
      </div>
      <div class="stat-bar" style="margin-bottom:8px"><div class="stat-fill" style="width:${hr}%;background:${c}"></div></div>`).join('')}
  </div>`;

  h+=`<div class="stat-card" style="border:1px solid rgba(100,116,139,.25);background:rgba(100,116,139,.04)">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">⟳ Lean Accuracy — Tracked Separately</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font:400 9px var(--S);color:var(--tx3)">${leanAllG.length} graded lean plays</span>
      <span style="font:700 13px var(--M);color:${leanHRc}">${leanHRs}${leanAllG.length?'%':''}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
      <div style="text-align:center;background:var(--ovA);border-radius:6px;padding:6px 4px">
        <div style="font:700 11px var(--M);color:var(--ov)">${leanOverG.length?(leanOverW/leanOverG.length*100).toFixed(0)+'%':'—'}</div>
        <div style="font:600 6px var(--M);color:var(--tx4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px">Lean ↗ ${leanOverW}/${leanOverG.length}</div>
      </div>
      <div style="text-align:center;background:var(--unA);border-radius:6px;padding:6px 4px">
        <div style="font:700 11px var(--M);color:var(--un)">${leanUnderG.length?(leanUnderW/leanUnderG.length*100).toFixed(0)+'%':'—'}</div>
        <div style="font:600 6px var(--M);color:var(--tx4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px">Lean ↘ ${leanUnderW}/${leanUnderG.length}</div>
      </div>
      <div style="text-align:center;background:rgba(100,116,139,.07);border-radius:6px;padding:6px 4px">
        <div style="font:700 11px var(--M);color:var(--tx3)">${leanHRs}${leanAllG.length?'%':''}</div>
        <div style="font:600 6px var(--M);color:var(--tx4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px">All Lean ${leanAllW}/${leanAllG.length}</div>
      </div>
    </div>
    <div style="font:400 8px var(--S);color:var(--tx4);margin-top:7px">Lean plays are engine-conflict calls. Excluded from all tier, HR, and P&L calculations above.</div>
  </div>`;

  const months=[...new Set(DS.map(d=>d.date.slice(0,7)))].sort();
  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Monthly Breakdown</div>`;
  months.forEach(m=>{
    const mDs=DS.filter(d=>d.date.startsWith(m));
    const mg=mDs.reduce((s,d)=>s+d.graded,0),mw=mDs.reduce((s,d)=>s+d.wins,0),mp=mDs.reduce((s,d)=>s+d.plays,0);
    const mhr=mg?(mw/mg*100).toFixed(1):'—';
    const[y,mo]=m.split('-');
    const mLbl=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    const hrC=mg&&mw/mg>=.55?'var(--gr)':mg&&mw/mg<.5?'var(--rd)':'var(--yl)';
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bg2)">
      <span style="font:600 10px var(--M);min-width:50px">${mLbl}</span>
      <span style="font:400 9px var(--S);color:var(--tx3);flex:1;text-align:center">${mp} plays · ${mw}W/${mg-mw}L</span>
      <span style="font:700 10px var(--M);color:${hrC};min-width:42px;text-align:right">${mhr}%</span>
    </div>`;
  });
  h+=`</div>`;

  const posBucket={Guard:{plays:0,wins:0},Forward:{plays:0,wins:0},Center:{plays:0,wins:0},Other:{plays:0,wins:0}};
  P.forEach(p=>{
    if(p.result!=='WIN'&&p.result!=='LOSS') return;
    const pos=(p.position||'').toLowerCase();
    let bucket='Other';
    if(pos.includes('guard')||pos==='g'||pos==='pg'||pos==='sg') bucket='Guard';
    else if(pos.includes('forward')||pos==='f'||pos==='sf'||pos==='pf') bucket='Forward';
    else if(pos.includes('center')||pos==='c') bucket='Center';
    posBucket[bucket].plays++; if(p.result==='WIN') posBucket[bucket].wins++;
  });
  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Position Breakdown</div>
    <div class="g4">
      ${Object.entries(posBucket).filter(([_,v])=>v.plays>0).map(([pos,v])=>{
        const hr=v.plays?(v.wins/v.plays*100).toFixed(1):'0.0';
        const c=+hr>=55?'var(--gr)':+hr>=50?'var(--yl)':'var(--rd)';
        return`<div class="kv"><div class="kv-l">${pos}</div><div class="kv-v" style="color:${c};font-size:13px">${hr}%</div><div style="font:400 7px var(--M);color:var(--tx4);margin-top:2px">${v.plays}p · ${v.wins}W</div></div>`;
      }).join('')}
    </div>
  </div>`;

  const dirBucket={'OVER':{plays:0,wins:0},'UNDER':{plays:0,wins:0},'LEAN OVER':{plays:0,wins:0},'LEAN UNDER':{plays:0,wins:0}};
  P.forEach(p=>{
    if(p.result!=='WIN'&&p.result!=='LOSS') return;
    if(dirBucket[p.dir]){dirBucket[p.dir].plays++;if(p.result==='WIN')dirBucket[p.dir].wins++;}
  });
  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Direction Breakdown</div>
    <div class="g4">
      ${Object.entries(dirBucket).filter(([_,v])=>v.plays>0).map(([dir,v])=>{
        const hr=v.plays?(v.wins/v.plays*100).toFixed(1):'0.0';
        const c=dir.includes('OVER')?'var(--ov)':'var(--un)';
        return`<div class="kv"><div class="kv-l">${dir}</div><div class="kv-v" style="color:${c};font-size:13px">${hr}%</div><div style="font:400 7px var(--M);color:var(--tx4);margin-top:2px">${v.plays}p · ${v.wins}W</div></div>`;
      }).join('')}
    </div>
  </div>`;

  const agrG=P.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&p.enginesAgree!==false);
  const splG=P.filter(p=>(p.result==='WIN'||p.result==='LOSS')&&p.enginesAgree===false);
  const agrW=agrG.filter(p=>p.result==='WIN').length;
  const splW=splG.filter(p=>p.result==='WIN').length;
  h+=`<div class="stat-card">
    <div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">V14 Engine Intelligence</div>
    <div class="g4">
      <div class="kv"><div class="kv-l">Agree HR</div><div class="kv-v" style="color:var(--gr);font-size:13px">${agrG.length?(agrW/agrG.length*100).toFixed(1)+'%':'—'}</div><div style="font:400 7px var(--M);color:var(--tx4);margin-top:2px">${agrG.length}p</div></div>
      <div class="kv"><div class="kv-l">Split HR</div><div class="kv-v" style="color:var(--rd);font-size:13px">${splG.length?(splW/splG.length*100).toFixed(1)+'%':'—'}</div><div style="font:400 7px var(--M);color:var(--tx4);margin-top:2px">${splG.length}p</div></div>
      <div class="kv"><div class="kv-l">ULTRA HR</div><div class="kv-v" style="color:var(--yl);font-size:13px">${ultraG.length?(ultraW/ultraG.length*100).toFixed(1)+'%':'—'}</div><div style="font:400 7px var(--M);color:var(--tx4);margin-top:2px">${ultraG.length}p</div></div>
      <div class="kv"><div class="kv-l">Lean HR</div><div class="kv-v" style="color:var(--tx3);font-size:13px">${leanAllG.length?(leanAllW/leanAllG.length*100).toFixed(0)+'%':'—'}</div><div style="font:400 7px var(--M);color:var(--tx4);margin-top:2px">${leanAllG.length} graded</div></div>
    </div>
  </div>`;

  return h;
}

// ─── NAV / INTERACTION ───
function jumpToMonth(m){const dates=allDates();const md=dates.filter(d=>d.startsWith(m));if(md.length)di=dates.indexOf(md[md.length-1]);}
function tgl(k){const now=Date.now();const isDouble=(k===_lastTap)&&(now-_lastTapTime<400);_lastTap=k;_lastTapTime=now;if(isDouble){if(exp.has(k))exp.delete(k);else exp.add(k);}else{if(exp.has(k)){exp.delete(k);}else{exp.clear();exp.add(k);}}render();}
function toggleLeader(name){if(leaderExp.has(name)){leaderExp.delete(name);leaderShowAll.delete(name);}else{leaderExp.clear();leaderShowAll.clear();leaderExp.add(name);}render();}
function setSpk(k,prop,val){if(!expSpk[k])expSpk[k]={win:'L10',venue:'all',line:'prop',customMin:null};expSpk[k][prop]=val;render();}
function setSpkMin(k,v){if(!expSpk[k])expSpk[k]={win:'L10',venue:'all',line:'prop',customMin:null};expSpk[k].customMin=v?parseFloat(v):null;render();}

// ─── BOOT ───
loadSeason('2026-27');
</script>
